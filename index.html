<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Urna</title>

<style>
body{
    text-align:center;
    background:#f4f4f4;
    font-family:Arial;
}

.urna-container{
    position:relative;
    display:inline-block;
}

.tela{
    position:absolute;
    top:18%;
    left:5.5%;
    width:51%;
    height:56%;
}

.tela img{
    width:100%;
    height:100%;
    object-fit:fill;
}

#barra{
    margin-top:15px;
    width:300px;
    height:50px;
    font-size:24px;
    text-align:center;
}

#votarBtn{
    display:none;
    margin-top:20px;
    padding:10px 30px;
    font-size:20px;
    background:green;
    color:white;
    border:none;
}

#contador{
    display:none;
    font-size:20px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div id="contador"></div>
<button id="votarBtn">Votar</button>

<div class="urna-container">
    <img src="./Urna.jpg" width="500">
    <div class="tela" id="tela"></div>
</div>

<br>

<input type="number" id="barra" placeholder="Digite o número">

<script>

let votos67 = localStorage.getItem("votos67");
votos67 = votos67 ? parseInt(votos67) : 0;

let votos69 = localStorage.getItem("votos69");
votos69 = votos69 ? parseInt(votos69) : 0;

let jaVotou = localStorage.getItem("jaVotou");

const barra = document.getElementById("barra");
const tela = document.getElementById("tela");
const votarBtn = document.getElementById("votarBtn");
const contador = document.getElementById("contador");

let candidatoAtual = null;

barra.addEventListener("input", function(){

    if(barra.value === "67"){

        candidatoAtual = "67";

        tela.innerHTML = "<img src='./67.png'>";
        contador.style.display = "block";
        contador.innerText = "Votos: " + votos67;

        if(!jaVotou){
            votarBtn.style.display = "inline-block";
        }

    }

    else if(barra.value === "69"){

        candidatoAtual = "69";

        tela.innerHTML = "<img src='./69.png'>";
        contador.style.display = "block";
        contador.innerText = "Votos: " + votos69;

        if(!jaVotou){
            votarBtn.style.display = "inline-block";
        }

    }

    else{
        candidatoAtual = null;
        tela.innerHTML = "";
        votarBtn.style.display = "none";
        contador.style.display = "none";
    }

});

votarBtn.addEventListener("click", function(){

    if(jaVotou){
        alert("Você já votou!");
        return;
    }

    if(candidatoAtual === "67"){
        votos67++;
        localStorage.setItem("votos67", votos67);
        contador.innerText = "Votos: " + votos67;
    }

    if(candidatoAtual === "69"){
        votos69++;
        localStorage.setItem("votos69", votos69);
        contador.innerText = "Votos: " + votos69;
    }

    localStorage.setItem("jaVotou", "sim");
    jaVotou = "sim";

    votarBtn.style.display = "none";

    alert("Voto confirmado!");

});

</script>

</body>
</html>
